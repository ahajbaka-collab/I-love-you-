<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; background-color: #ffe4e1; overflow: hidden; }
        h1 { color: #d63384; text-align: center; }
        .buttons { display: flex; gap: 20px; margin-top: 20px; }
        button { padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #888; color: white; position: relative; }
    </style>
</head>
<body>
    <h1 id="question">Will you be my Valentine? ❤️</h1>
    <div class="buttons">
        <button id="yesBtn">Yes! 😍</button>
        <button id="noBtn">No 😢</button>
    </div>

    <script>
        const noBtn = document.getElementById("noBtn");
        const yesBtn = document.getElementById("yesBtn");

        // جعل زر "لا" يهرب من الماوس أو اللمس
        noBtn.addEventListener("mouseover", moveButton);
        noBtn.addEventListener("touchstart", moveButton);

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = "absolute";
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        yesBtn.onclick = () => {
            document.getElementById("question").innerHTML = "I knew it! ❤️ I Love You!";
            document.querySelector(".buttons").style.display = "none";
        };
    </script>
</body>
</html>
