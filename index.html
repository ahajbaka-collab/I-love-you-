<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي المطرقة والبيضة الغامضة</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f7f9fc;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            /* استبدال المؤشر بالمطرقة */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="%238B4513" d="M2 17.15V21a1 1 0 0 0 1 1h3.85a1 1 0 0 0 .71-.29L21.71 7.56a1 1 0 0 0 0-1.41l-3.85-3.85a1 1 0 0 0-1.41 0l-4.42 4.41-1.41-1.41-1.42 1.41 1.41 1.41L2.29 16.44a1 1 0 0 0-.29.71zm15.76-13.3l2.44 2.44-11 11H6.76V14.84l11-11z"/><circle cx="12" cy="12" r="1.5" fill="%23C0C0C0"/></svg>') 16 16, auto;
        }

        body:active {
            /* تأثير بسيط عند الضغط لتبدو كضربة مطرقة */
            transform: translateY(2px);
        }

        #game-ui {
            text-align: center;
        }

        h1 { color: #5a67d8; margin-bottom: 5px;}
        p.desc { font-size: 1.2rem; color: #4a5568; margin-bottom: 30px;}

        #egg {
            font-size: 150px;
            user-select: none;
            transition: text-shadow 0.2s;
        }

        /* تنسيق لرسالة النهاية مع الدمية */
        #doll-stage {
            display: none;
            text-align: center;
            animation: pop 0.6s ease-out forwards;
        }

        .doll-avatar {
            font-size: 180px;
            display: block;
            margin-bottom: -15px; /* لتقريب النص */
        }

        .speech-bubble {
            background-color: white;
            padding: 20px 30px;
            border-radius: 20px;
            border: 2px solid #5a67d8;
            font-size: 30px;
            font-weight: bold;
            color: #2d3748;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            top: -15px; /* السهم للأعلى */
            right: 50px;
            border-width: 0 15px 15px;
            border-style: solid;
            border-color: #5a67d8 transparent;
        }

        @keyframes pop {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            70% { transform: scale(1.1) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        button.retry {
            margin-top: 30px;
            padding: 10px 25px;
            background-color: #5a67d8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
