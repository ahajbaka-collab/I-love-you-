<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة كسر البيضة</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; padding-top: 50px; background-color: #f0f0f0; }
        #game-area { font-size: 100px; cursor: pointer; margin: 20px; }
        #message { font-size: 24px; color: #d9534f; font-weight: bold; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>اضرب البيضة 5 مرات! 🔨</h1>
    <div id="game-area" onclick="hitEgg()">🥚</div>
    <div id="result" class="hidden">
        <div style="font-size: 100px;">🐥</div>
        <p id="message">مااتابعك لو تموت</p>
    </div>

    <script>
        let hits = 0;
        function hitEgg() {
            hits++;
            if (hits === 5) {
                document.getElementById("game-area").style.display = "none";
                document.getElementById("result").classList.remove("hidden");
            } else if (hits < 5) {
                alert("بقي " + (5 - hits) + " ضربات!");
            }
        }
    </script>
</body>
</html>
