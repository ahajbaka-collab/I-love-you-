<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة البيضة الغامضة</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #egg {
            font-size: 120px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        #egg:active {
            transform: scale(0.9) rotate(5deg);
        }

        .counter {
            font-size: 24px;
            color: #333;
            margin-top: 20px;
            font-weight: bold;
        }

        #message {
            display: none;
            text-align: center;
            animation: pop 0.5s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1.2); }
        }

        h1 { color: #ff6b6b; }
    </style>
</head>
<body>

    <div id="game-ui">
        <h1>اضغط على البيضة لتكتشف السر!</h1>
        <div id="egg">🥚</div>
        <div class="counter">بقي <span id="clicks-left">50</span> نقرة</div>
    </div>

    <div id="message">
        <h1 style="font-size: 50px;">🐣 مبروووك!</h1>
        <p style="font-size: 20px;">لقد فقست البيضة وخرج الصوص الصغير!</p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">العب مرة أخرى</button>
    </div>

    <script>
        let clicks = 5; // يمكنك تغيير عدد النقرات من هنا
        const egg = document.getElementById('egg');
        const clicksLeft = document.getElementById('clicks-left');
        const gameUI = document.getElementById('game-ui');
        const message = document.getElementById('message');

        // مصفوفة تعابير البيضة وهي تنكسر
        const stages = ['🥚', '🥚', '🐣', '🐥'];

        egg.addEventListener('click', () => {
            clicks--;
            clicksLeft.innerText = clicks;

            // اهتزاز بسيط عند النقرة
            egg.style.transform = `translateX(${Math.random() * 5}px)`;

            if (clicks <= 10) {
                egg.innerText = '🐣'; // بدأت تفقس
            }

            if (clicks <= 0) {
                gameUI.style.display = 'none';
                message.style.display = 'block';
                // إضافة بعض القصاصات الورقية (Confetti) لو أردت لاحقاً
            }
        });
    </script>
</body>
</html>
